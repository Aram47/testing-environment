name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testing-environment-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: testing-environment-backend/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --passWithNoTests
      - run: npm run test:e2e -- --passWithNoTests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testing-environment-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: testing-environment-frontend/package-lock.json
      - run: npm ci
      - run: npm run api:check
        working-directory: testing-environment-frontend
      - run: npm run lint
      - run: npm run build
      - run: npm test
