services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: testing-env-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backend_test_runner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backend_test_runner"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - testing-network

  # NestJS Backend
  backend:
    build:
      context: ./testing-environment-backend
      dockerfile: Dockerfile
    container_name: testing-env-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/backend_test_runner?schema=public
      JWT_SECRET: your-secret-key-change-this-in-production
      JWT_EXPIRES_IN: 15m
      SECRET_ENCRYPTION_KEY: your-32-byte-base64-key-change-this-in-production
      RUNNER_WORKSPACE_ROOT: /tmp/backend-test-runner
      RUNNER_REQUEST_TIMEOUT_MS: 30000
      RUNNER_DEFAULT_TIMEOUT_MINUTES: 10
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /tmp/backend-test-runner:/tmp/backend-test-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - testing-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # React Frontend (nginx)
  frontend:
    build:
      context: ./testing-environment-frontend
      dockerfile: Dockerfile
    container_name: testing-env-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - testing-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

networks:
  testing-network:
    driver: bridge
