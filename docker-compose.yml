services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: testing-env-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backend_test_runner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backend_test_runner"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - testing-network

  redis:
    image: redis:7-alpine
    container_name: testing-env-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - testing-network

  # NestJS Backend API
  backend-api:
    build:
      context: ./testing-environment-backend
      dockerfile: Dockerfile
      target: api
    container_name: testing-env-backend-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      APP_ROLE: api
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/backend_test_runner?schema=public
      JWT_SECRET: your-secret-key-change-this-in-production
      JWT_EXPIRES_IN: 15m
      SECRET_ENCRYPTION_KEY: your-32-byte-base64-key-change-this-in-production
      REDIS_URL: redis://redis:6379
      RUNNER_WORKSPACE_ROOT: /tmp/backend-test-runner
      RUNNER_REQUEST_TIMEOUT_MS: 30000
      RUNNER_DEFAULT_TIMEOUT_MINUTES: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - testing-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Dedicated runner worker with Docker socket access
  runner-worker:
    build:
      context: ./testing-environment-backend
      dockerfile: Dockerfile
      target: runner-worker
    container_name: testing-env-runner-worker
    environment:
      NODE_ENV: development
      APP_ROLE: worker
      WORKER_HEALTH_PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/backend_test_runner?schema=public
      JWT_SECRET: your-secret-key-change-this-in-production
      JWT_EXPIRES_IN: 15m
      SECRET_ENCRYPTION_KEY: your-32-byte-base64-key-change-this-in-production
      REDIS_URL: redis://redis:6379
      RUNNER_WORKSPACE_ROOT: /tmp/backend-test-runner
      RUNNER_REQUEST_TIMEOUT_MS: 30000
      RUNNER_DEFAULT_TIMEOUT_MINUTES: 10
      TEST_RUN_RUNNER_ID: runner-worker-1
      TEST_RUN_LEASE_DURATION_MS: 60000
      TEST_RUN_HEARTBEAT_INTERVAL_MS: 15000
      TEST_RUN_CANCELLATION_POLL_INTERVAL_MS: 1000
      TEST_RUN_JANITOR_INTERVAL_MS: 30000
      TEST_RUN_QUEUE_CONCURRENCY: 1
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    volumes:
      - /tmp/backend-test-runner:/tmp/backend-test-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - testing-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3001/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # React Frontend (nginx)
  frontend:
    build:
      context: ./testing-environment-frontend
      dockerfile: Dockerfile
    container_name: testing-env-frontend
    ports:
      - "80:80"
    depends_on:
      - backend-api
    networks:
      - testing-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: testing-env-prometheus
    profiles:
      - observability
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend-api:
        condition: service_healthy
      runner-worker:
        condition: service_healthy
    networks:
      - testing-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  testing-network:
    driver: bridge
